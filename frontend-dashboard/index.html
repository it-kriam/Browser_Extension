                        { label: "Saved", val: nv(dTkSaved).toLocaleString(), color: "#58a6ff", bg: "rgba(88,166,255,0.03)", tab: "saved" },
                        { label: "Cost", val: `$${nv(dCUsed).toFixed(4)}`, color: "#fca5a5", bg: "rgba(248,81,73,0.03)", tab: "used" },
                        { label: "Value", val: `$${nv(dCSaved).toFixed(4)}`, color: "#3fb950", bg: "rgba(63,185,80,0.03)", tab: "saved" },
                      ].map(tk => (

                      <p style={{ fontSize: 12, color: "#6e7681", marginTop: 2 }}>Deep dive into your AI security posture</p>
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: isMobile ? "repeat(2,1fr)" : isTablet ? "repeat(3,1fr)" : "repeat(5,1fr)", gap, marginBottom: gap }}>
                      <StatCard delay={1} label="Safe Prompts" value={displaySafe.toLocaleString()} icon="✅" accentColor="#3fb950" borderColor="#2ea04322" bgColor="#0f1e13" />
                      <StatCard delay={2} label="Redacted" value={displayRed.toLocaleString()} icon="✏️" accentColor="#a371f7" borderColor="#a371f722" bgColor="#130d1e" />  {/* PURPLE */}
                      <StatCard delay={3} label="Blocked" value={displayBlk.toLocaleString()} icon="🚫" accentColor="#f85149" borderColor="#da363322" bgColor="#1a0e0e" />
                      <StatCard delay={4} label="Critical Incidents" value={displayCrit.toLocaleString()} icon="⚡" accentColor="#d29922" borderColor="#d2992222" bgColor="#1a1508" />  {/* YELLOW */}
                      <StatCard delay={5} label="Total Prompts" value={displayTot.toLocaleString()} icon="📊" accentColor="#fb8f44" borderColor="#e3662022" bgColor="#1a1108" sub={`Block rate: ${br}%`} />
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap }}>
                      <div className="card" style={{ display: "flex", flexDirection: "column" }}>
                        <div style={{ padding: "14px 18px 12px", borderBottom: "1px solid #21262d", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                            <span style={{ fontSize: 15 }}>📈</span>
                            <span style={{ fontSize: 13, fontWeight: 600, color: "#e6edf3" }}>Prompt Activity ({range} days)</span>
                          </div>
                          <select value={range} onChange={e => setRange(parseInt(e.target.value))}
                            style={{ appearance: "none", background: "rgba(255,255,255,0.05)", border: "1px solid #30363d", color: "#8b949e", fontSize: 10, borderRadius: 4, padding: "2px 8px", outline: "none", cursor: "pointer" }}>
                            <option value={7}>7 Days</option>
                            <option value={15}>15 Days</option>
                            <option value={30}>30 Days</option>
                          </select>
                        </div>
                        <div style={{ padding: "10px 18px 16px", height: isMobile ? 200 : 260, position: "relative" }}><LineChart logs={filteredLogs} range={range} /></div>
                      </div>
                      <div className="card" style={{ display: "flex", flexDirection: "column" }}>
                        <div style={{ padding: "14px 18px 12px", borderBottom: "1px solid #21262d", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                            <span style={{ fontSize: 15 }}>⚙️</span>
                            <span style={{ fontSize: 13, fontWeight: 600, color: "#e6edf3" }}>Top Risk Categories ({range} days)</span>
                          </div>
                          <select value={range} onChange={e => setRange(parseInt(e.target.value))}
                            style={{ appearance: "none", background: "rgba(255,255,255,0.05)", border: "1px solid #30363d", color: "#8b949e", fontSize: 10, borderRadius: 4, padding: "2px 8px", outline: "none", cursor: "pointer" }}>
                            <option value={7}>7 Days</option>
                            <option value={15}>15 Days</option>
                            <option value={30}>30 Days</option>
                          </select>
                        </div>
                        <div style={{ padding: "10px 18px 16px", height: isMobile ? 200 : 260, position: "relative" }}><DonutChart data={filteredRisks} /></div>
                      </div>
                      <div className="card" id="ai-tool-usage-chart" style={{ display: "flex", flexDirection: "column" }}>
                        <div style={{ padding: "14px 18px 12px", borderBottom: "1px solid #21262d", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                            <span style={{ fontSize: 15 }}>🤖</span>
                            <span style={{ fontSize: 13, fontWeight: 600, color: "#e6edf3" }}>AI Tool Usage ({range} days)</span>
                          </div>
                          <select value={range} onChange={e => setRange(parseInt(e.target.value))}
                            style={{ appearance: "none", background: "rgba(255,255,255,0.05)", border: "1px solid #30363d", color: "#8b949e", fontSize: 10, borderRadius: 4, padding: "2px 8px", outline: "none", cursor: "pointer" }}>
                            <option value={7}>7 Days</option>
                            <option value={15}>15 Days</option>
                            <option value={30}>30 Days</option>
                          </select>
                        </div>
                        <div style={{ padding: "10px 18px 16px", height: isMobile ? 200 : 260, position: "relative" }}><BarChart data={filteredTools} isAiToolChart={true} /></div>
                      </div>
                      <div className="card" id="user-directory-card" style={{ display: "flex", flexDirection: "column" }}>
                        <CH icon="👥" title="User Directory" />
                        <div style={{ flex: 1, padding: "0 10px", margin: "10px 0", overflowY: "auto", maxHeight: 260 }}>
                          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                            <thead>
                              <tr style={{ textAlign: "left", borderBottom: "1px solid #30363d", color: "#8b949e" }}>
                                <th style={{ padding: "10px 8px" }}>User</th>
                                <th style={{ padding: "10px 8px" }}>Organization</th>
                                <th style={{ padding: "10px 8px" }}>Role</th>
                              </tr>
                            </thead>
                            <tbody>
                              {users.length === 0 ? (
                                <tr><td colSpan="3" style={{ padding: 20, textAlign: "center", color: "#484f58" }}>No user data available.</td></tr>
                              ) : users.map(u => (
                                <tr key={u.user_id} className="tr-hover" style={{ borderBottom: "1px solid #21262d55" }}>
                                  <td style={{ padding: "10px 8px", color: "#58a6ff", fontWeight: 700 }}>{u.display_name || u.user_id}</td>
                                  <td style={{ padding: "10px 8px", color: "#c9d1d9" }}>
                                    {orgLabel(String(u.orgId || u.org_id || u.user_id))}
                                  </td>
                                  <td style={{ padding: "10px 8px" }}>
                                    <span style={{
                                      fontSize: 10, padding: "2px 8px", borderRadius: 10, fontWeight: 700,
                                      background: u.role === "ADMIN" ? "rgba(35,134,54,.1)" : "rgba(139,148,158,.1)",
                                      color: u.role === "ADMIN" ? "#3fb950" : "#8b949e",
                                      border: "1px solid currentcolor"
                                    }}>
                                      {u.role}
                                    </span>
                                  </td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {tab === "tokens" && (
                  <div className="fade-up">
                    <div style={{ display: "flex", alignItems: "flex-start", gap: 12, marginBottom: 20, flexWrap: "wrap" }}>
                      <div>
                        <h1 style={{ fontSize: 18, fontWeight: 700, color: "#e6edf3" }}>Token Analytics</h1>
                        <p style={{ fontSize: 12, color: "#6e7681", marginTop: 2 }}>Monitor AI token consumption and financial efficiency</p>
                      </div>
                      {isA && (
                        <select value={filter} onChange={e => handleFilter(e.target.value)}
                          style={{ marginLeft: "auto", background: "#161b22", border: "1px solid #30363d", color: "#c9d1d9", borderRadius: 8, padding: "7px 12px", fontSize: 12, outline: "none", cursor: "pointer", fontFamily: "inherit" }}>
                          <option value="ALL">All Environments (Shared)</option>
                          {users.map(u => (
                            <option key={u.user_id} value={u.user_id}>
                              {u.display_name || u.user_id} {u.org_name ? `(${u.org_name})` : ""}
                            </option>
                          ))}
                        </select>
                      )}
                    </div>

                    <div style={{ display: "flex", alignItems: "center", gap: 30, marginBottom: 20, borderBottom: "1px solid #21262d" }}>
                      <div onClick={() => setSubTokenTab("used")} style={{
                        paddingBottom: 10, cursor: "pointer",
                        color: subTokenTab === "used" ? "#58a6ff" : "#8b949e",
                        borderBottom: `2px solid ${subTokenTab === "used" ? "#58a6ff" : "transparent"}`,
                        fontSize: 13, fontWeight: 600, transition: "all .2s"
                      }}>Tokens Used (Actual)</div>
                      <div onClick={() => setSubTokenTab("saved")} style={{
                        paddingBottom: 10, cursor: "pointer",
                        color: subTokenTab === "saved" ? "#39d353" : "#8b949e",
                        borderBottom: `2px solid ${subTokenTab === "saved" ? "#39d353" : "transparent"}`,
                        fontSize: 13, fontWeight: 600, transition: "all .2s"
                      }}>Tokens Saved (Estimated)</div>
                    </div>

                    <div style={{ display: "flex", gap: 16, marginBottom: 24, flexWrap: "wrap" }}>
                      <div style={{ flex: 1, minWidth: 260, background: "linear-gradient(135deg,#161b22,#0d1117)", border: "1px solid #30363d", borderRadius: 12, padding: "20px 24px", boxShadow: "0 4px 20px rgba(0,0,0,.3)" }}>
                        <div style={{ color: "#8b949e", fontSize: 10, fontWeight: 800, textTransform: "uppercase", marginBottom: 8, letterSpacing: "1px" }}>
                          {subTokenTab === "used" ? "TOTAL TOKENS USED" : "TOTAL TOKENS SAVED"}
                        </div>
                        <div style={{ color: "#f0f6fc", fontSize: 38, fontWeight: 800, letterSpacing: "-1px" }}>
                          {nv(subTokenTab === "used" ? dTkUsed : dTkSaved).toLocaleString()}
                        </div>
                      </div>
                      <div style={{ flex: 1, minWidth: 260, background: subTokenTab === "used" ? "linear-gradient(135deg,#0d2a45,#051625)" : "linear-gradient(135deg,#0d452a,#052516)", border: `1px solid ${subTokenTab === "used" ? "#1f6feb33" : "#2ea04333"}`, borderRadius: 12, padding: "20px 24px", boxShadow: "0 4px 20px rgba(0,0,0,.3)" }}>
                        <div style={{ color: subTokenTab === "used" ? "#79c0ff" : "#39d353", fontSize: 10, fontWeight: 800, textTransform: "uppercase", marginBottom: 8, letterSpacing: "1px" }}>
                          {subTokenTab === "used" ? "ESTIMATED ACTUAL COST" : "TOTAL COST SAVINGS"}
                        </div>
                        <div style={{ color: "#f0f6fc", fontSize: 38, fontWeight: 800, letterSpacing: "-1px" }}>
                          ${nv(subTokenTab === "used" ? dCUsed : dCSaved).toFixed(4)}
                        </div>
                      </div>
                    </div>

                    <div className="card" style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden", borderRadius: 12 }}>
                      <div style={{ padding: "14px 18px", borderBottom: "1px solid #21262d", display: "flex", alignItems: "center", gap: 10, background: "#0d1117" }}>
                        <span style={{ fontSize: 16 }}>{subTokenTab === "used" ? "⚡" : "🛡️"}</span>
                        <span style={{ fontSize: 13, fontWeight: 700, color: "#e6edf3" }}>{subTokenTab === "used" ? "Allowed Request Usage (Click row for details)" : "Blocked Prompt Savings (Click row for details)"}</span>
                      </div>
                      <div style={{ flex: 1, overflow: "auto", minHeight: 400 }}>
                        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                          <thead style={{ position: "sticky", top: 0, background: "#161b22", zIndex: 1, borderBottom: "1px solid #21262d" }}>
                            <tr>
                              <th style={{ textAlign: "left", padding: "12px 14px", color: "#8b949e", fontWeight: 600, textTransform: "uppercase", fontSize: 10, letterSpacing: ".5px" }}>Time</th>
                              <th style={{ textAlign: "left", padding: "12px 14px", color: "#8b949e", fontWeight: 600, textTransform: "uppercase", fontSize: 10, letterSpacing: ".5px" }}>User</th>
                              <th style={{ textAlign: "left", padding: "12px 14px", color: "#8b949e", fontWeight: 600, textTransform: "uppercase", fontSize: 10, letterSpacing: ".5px" }}>Tool</th>
                              <th style={{ textAlign: "left", padding: "12px 14px", color: "#8b949e", fontWeight: 600, textTransform: "uppercase", fontSize: 10, letterSpacing: ".5px" }}>{subTokenTab === "used" ? "Tokens" : "Saved"}</th>
                              <th style={{ textAlign: "left", padding: "12px 14px", color: "#8b949e", fontWeight: 600, textTransform: "uppercase", fontSize: 10, letterSpacing: ".5px" }}>{subTokenTab === "used" ? "Cost" : "Value"}</th>
                              <th style={{ textAlign: "right", padding: "12px 14px", color: "#8b949e", fontWeight: 600, textTransform: "uppercase", fontSize: 10, letterSpacing: ".5px" }}>Prompt</th>
                            </tr>
                          </thead>
                          <tbody>
                            {(subTokenTab === "used" ? fltUsed : fltSaved).length === 0 ? (
                              <tr><td colSpan="6" style={{ padding: 40, textAlign: "center", color: "#484f58", fontSize: 13 }}>No token data available yet.</td></tr>
                            ) : (subTokenTab === "used" ? fltUsed : fltSaved).map((l, i) => (
                              <tr key={i} onClick={() => setPromptModal({ ...l, variant: "compact" })} className="tr-hover" style={{ borderBottom: "1px solid #21262d55", cursor: "pointer" }}>
                                <td style={{ padding: 14, color: "#8b949e", fontFamily: "'JetBrains Mono',monospace", whiteSpace: "nowrap" }}>{fmtAge(l.timestamp)}</td>
                                <td style={{ padding: 14, color: "#58a6ff", fontWeight: 700, whiteSpace: "nowrap" }}>{orgLabel(l.userId)}</td>
                                <td style={{ padding: 14, color: "#c9d1d9", whiteSpace: "nowrap" }}>{l.tool}</td>
                                <td style={{ padding: 14, color: "#c9d1d9", fontWeight: 600 }}>{nv(l.tokens || l.saved).toLocaleString()}</td>
                                <td style={{ padding: 14, color: subTokenTab === "used" ? "#fca5a5" : "#39d353", fontWeight: 800, fontSize: 13 }}>
                                  {subTokenTab === "used" ? "-" : "+"}${nv(l.cost || l.value).toFixed(4)}
                                </td>
                                <td style={{ padding: "8px 14px", color: "#c9d1d9", whiteSpace: "nowrap", textAlign: "right" }}>
                                  {l.originalPrompt ? (
                                    <div title="View Prompt Details"
                                      style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 32, height: 32, background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 6, transition: "all .15s" }}>
                                      <span style={{ fontSize: 16 }}>📄</span>
                                    </div>
                                  ) : <span style={{ color: "#484f58" }}>—</span>}
                                </td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </div>
                )}

                {tab === "policies" && <KeywordPoliciesPanel API={API} orgLabel={orgLabel} />}
                {tab === "keywords" && <UserKeywordsPage userId={user.userId} API={API} />}

                {tab === "test" && (
                  <div className="fade-up">
                    <div style={{ marginBottom: 16 }}>
                      <h1 style={{ fontSize: 18, fontWeight: 700, color: "#e6edf3" }}>Test Prompt</h1>
                      <p style={{ fontSize: 12, color: "#6e7681", marginTop: 2 }}>Submit a prompt and see the real-time security analysis</p>
                    </div>
                    <TestPanel userId={user.userId} onDone={load} />
                  </div>
                )}
              </div>
            </div>
          )}
          {promptModal && <PromptModal log={promptModal} onClose={() => setPromptModal(null)} Badge={Badge} orgLabel={orgLabel} />}
        </div>
      );
    }

    function App() {
      const [user, setUser] = useState(null);
      if (!user) return <Login onLogin={setUser} />;
      return <Dashboard user={user} onLogout={() => setUser(null)} />;
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>

</html>
